<!DOCTYPE html>
<html>
<head>
    <title>Job Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Job Board Website</h1>

<input type="text" id="search" placeholder="Search Jobs">

<button onclick="searchJob()">Search</button>

<div id="jobs">

    <div class="job">
        <h3>Frontend Developer</h3>
        <p>Company: ABC Tech</p>
        <p>Location: Hyderabad</p>
        <button onclick="applyJob()">Apply</button>
    </div>

    <div class="job">
        <h3>Java Developer</h3>
        <p>Company: XYZ Solutions</p>
        <p>Location: Bangalore</p>
        <button onclick="applyJob()">Apply</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
